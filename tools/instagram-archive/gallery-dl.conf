{
  "extractor": {
    "base-directory": "/downloads",
    "directory": [
      "{username}",
      "{post_date:%Y}",
      "{post_date:%m}"
    ],
    "filename": "{post_date:%Y-%m-%d}_{post_shortcode}_{num:>02}_{media_id}.{extension}",
    "archive": "/state/download-archive.sqlite3",
    "archive-event": "file",
    "retries": 4,
    "sleep-request": "6.0-12.0",
    "sleep-429": "exp=60-600",
    "instagram": {
      "api": "rest",
      "include": "posts",
      "metadata": true,
      "order-files": "asc",
      "previews": "video",
      "user-cache": false,
      "user-strategy": "web",
      "videos": true
    }
  },
  "downloader": {
    "part": true,
    "mtime": true
  },
  "output": {
    "mode": "auto",
    "progress": true,
    "shorten": "eaw"
  }
}
